# Release for @avatarsd-llc/strawberry-cli.
#
# Fires on a v* tag. Regenerates the codec, runs the gate (typecheck + tests),
# builds, and packs the tarball, then publishes to the public npm registry
# (npmjs.org) and attaches the .tgz to the GitHub Release.
#
# Publishing requires the NPM_TOKEN repo secret (an npmjs.com Automation token for
# the @avatarsd-llc org). Without it the publish step fails — that secret is the one
# credential you create. Public-npm installs are anonymous: `npm i @avatarsd-llc/strawberry-cli`.
name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # softprops/action-gh-release creates the GitHub Release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          # Writes an .npmrc for the public registry and wires NODE_AUTH_TOKEN
          # as its auth token (consumed by `npm publish` below).
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Codec is gitignored; regenerate before build/test (ADR-0066 D2).
      - name: Generate protobuf codec
        run: npm run proto

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Pack tarball
        run: npm pack

      # Publishes to the public npm registry. The `files` allowlist in package.json
      # scopes the payload (dist, bin, skill, proto, docs); --access public makes the
      # scoped package world-installable. Auth is the NPM_TOKEN Automation secret.
      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: GitHub Release (attach tarball)
        uses: softprops/action-gh-release@v2
        with:
          files: '*.tgz'
          generate_release_notes: true
