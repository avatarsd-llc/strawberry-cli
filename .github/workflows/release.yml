# Release for @avatarsd-llc/device-client.
#
# Fires on a v* tag. Regenerates the codec, runs the gate (typecheck + tests),
# builds, and packs the tarball, then publishes to GitHub Packages
# (npm.pkg.github.com) and attaches the .tgz to the GitHub Release.
#
# No manually-created credential is required: the publish authenticates with the
# automatic GITHUB_TOKEN, which `permissions.packages: write` scopes for publish.
# The package scope (@avatarsd-llc) must match the repo owner — it does.
name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # softprops/action-gh-release creates the GitHub Release
  packages: write   # npm publish -> GitHub Packages via GITHUB_TOKEN

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          # Writes an .npmrc pointing the @avatarsd-llc scope at GitHub Packages
          # and wires NODE_AUTH_TOKEN as the auth token for that host.
          registry-url: https://npm.pkg.github.com
          scope: '@avatarsd-llc'
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Codec is gitignored; regenerate before build/test (ADR-0066 D2).
      - name: Generate protobuf codec
        run: npm run proto

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Pack tarball
        run: npm pack

      # Publishes to GitHub Packages. The `files` allowlist in package.json scopes
      # the payload (dist, bin, skill, proto, docs); publishConfig.registry pins
      # the target registry. Auth is the automatic per-run GITHUB_TOKEN.
      - name: Publish to GitHub Packages
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: GitHub Release (attach tarball)
        uses: softprops/action-gh-release@v2
        with:
          files: '*.tgz'
          generate_release_notes: true
