# Release for @avatarsd-llc/strawberry-cli.
#
# Fires on a v* tag. Regenerates the codec, runs the gate (typecheck + tests),
# builds, and packs the tarball. Publishes to npm only when the NPM_TOKEN secret
# is present; otherwise it skips the publish and just attaches the .tgz to the
# GitHub Release so the artifact is never lost.
name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    # Hoisted to job scope so the publish-vs-skip `if:` guards can read it
    # (secrets are not directly referenceable in `if:` expressions).
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Codec is gitignored; regenerate before build/test (ADR-0066 D2).
      - name: Generate protobuf codec
        run: npm run proto

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Pack tarball
        run: npm pack

      # Publish only if the org secret is configured. The `files` allowlist in
      # package.json scopes the published payload (dist, bin, skill, proto, docs).
      - name: Publish to npm
        if: ${{ env.NPM_TOKEN != '' }}
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Skipped publish notice
        if: ${{ env.NPM_TOKEN == '' }}
        run: echo "NPM_TOKEN not set; skipping npm publish and attaching the tarball only."

      - name: GitHub Release (attach tarball)
        uses: softprops/action-gh-release@v2
        with:
          files: '*.tgz'
          generate_release_notes: true
