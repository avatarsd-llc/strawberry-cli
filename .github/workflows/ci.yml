# CI for the strawberry monorepo (npm workspaces).
#
# Gates every push and PR across BOTH packages: regenerate the protobuf codec
# (gitignored, ADR-0066 D2) in @avatarsd-llc/strawberry-client, typecheck, run the
# vitest suites, build in dependency order (library then CLI), and enforce the
# purity gate (now owned by strawberry-client).
# The SIL acceptance run is informational only (continue-on-error): it exercises
# the real CLI binary against the mock board and still surfaces the documented
# OPEN protocol findings (push-only `query snapshot`, inactive-unit io-add) as
# failing rows, so it must not block the merge.
name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies (workspace)
        run: npm ci

      # ws is an optional peer dependency (Node transport + SIL mock board);
      # npm ci skips it, so install it explicitly into the CLI workspace for SIL.
      - name: Install ws (optional peer)
        run: npm i --no-save -w @avatarsd-llc/strawberry-cli ws

      # strawberry-client/src/proto/messages.ts is gitignored and consumed by
      # tsc/tsup/vitest, so it must exist before any of them run.
      - name: Generate protobuf codec (strawberry-client)
        run: npm run proto -w @avatarsd-llc/strawberry-client

      # Build the library FIRST: the CLI typecheck resolves
      # '@avatarsd-llc/strawberry-client' through its package exports, which point at
      # dist/*.d.ts — so the library's dist must exist before tsc runs on the CLI.
      - name: Build strawberry-client
        run: npm run build -w @avatarsd-llc/strawberry-client

      - name: Typecheck (both packages)
        run: npm run typecheck --workspaces --if-present

      - name: Test (both packages)
        run: npm run test --workspaces --if-present

      - name: Build strawberry-cli
        run: npm run build -w @avatarsd-llc/strawberry-cli

      - name: Purity gate (strawberry-client)
        run: npm run lint:purity -w @avatarsd-llc/strawberry-client

      # Informational: drives the built CLI against the mock board. Expected to
      # report the OPEN protocol findings as failing rows; never blocks CI.
      - name: SIL acceptance (informational)
        run: node packages/strawberry-cli/sil/run-sil.mjs
        continue-on-error: true
